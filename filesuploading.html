<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #main {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }
      input {
        display: none;
      }

      #btn {
        padding: 12px 30px;
        background-color: rgb(10, 205, 82);
        color: white;
        font-weight: 600;
        border-radius: 12px;
      }

      #btn:hover {
        background-color: rgb(60, 137, 88);
      }
    </style>
  </head>
  <body>
    <div id="main">
      <input id="fileinput" type="file" />
      <div id="btn">Upload File</div>
    </div>
    <script>
      let btn = document.querySelector("#btn");
      let fileinput = document.querySelector("#fileinput");

      btn.addEventListener("click", function () {
        fileinput.click();
      });

      fileinput.addEventListener("change", function (evt) {
        btn.textContent = evt.target.files[0].name;
      });
    </script>
  </body>
</html>
